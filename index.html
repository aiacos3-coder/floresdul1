<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores</title>
<style>
body { margin:0; background:black; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.lineJoin = "round";
ctx.lineCap = "round";

async function load(file){
    const res = await fetch(file);
    return res.json();
}

function prepare(regions){
    let pts = regions.flatMap(r => r.contour);

    let minX = Math.min(...pts.map(p => p[0]));
    let maxX = Math.max(...pts.map(p => p[0]));
    let minY = Math.min(...pts.map(p => p[1]));
    let maxY = Math.max(...pts.map(p => p[1]));

    let scale = Math.min(500/(maxX-minX), 500/(maxY-minY));
    let cx = (minX + maxX)/2;
    let cy = (minY + maxY)/2;

    return {scale, cx, cy};
}

function drawRegion(region, prep, ox, oy){
    ctx.fillStyle = `rgb(${region.color[0]},${region.color[1]},${region.color[2]})`;

    ctx.beginPath();

    region.contour.forEach((p,i)=>{
        let x = (p[0]-prep.cx)*prep.scale + ox;
        let y = (prep.cy-p[1])*prep.scale + oy;

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.closePath();
    ctx.fill();
}

Promise.all([
    load("rosas.json"),
    load("sunflowers.json")
]).then(([rosas, girasoles])=>{

    // 🔥 LIMITAR (CLAVE)
    rosas = rosas.slice(0, 300);
    girasoles = girasoles.slice(0, 200);

    let prepR = prepare(rosas);
    let prepS = prepare(girasoles);

    let angle = 0;

    function loop(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.rotate(angle);

        // 🌹 rosas
        drawRegion(rosas[0], prepR, -200, 100);
        drawRegion(rosas[1], prepR, 200, 100);
        drawRegion(rosas[2], prepR, 0, -200);

        // 🌼 girasol
        drawRegion(girasoles[0], prepS, 0, 200);

        ctx.restore();

        angle += 0.01;

        requestAnimationFrame(loop);
    }

    loop();
});
</script>

</body>
</html>
