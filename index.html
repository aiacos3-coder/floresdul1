<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flores</title>
<style>
body { margin:0; background:black; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// tamaño fijo (IMPORTANTE)
canvas.width = 800;
canvas.height = 800;

// prueba básica (si no ves esto, el problema es tu navegador)
ctx.fillStyle = "white";
ctx.fillRect(100,100,100,100);

// 🌼 flor simple
function flower(x,y){
    for(let i=0;i<12;i++){
        ctx.beginPath();
        ctx.arc(x,y+40,20,0,Math.PI*2);
        ctx.fillStyle="yellow";
        ctx.fill();
        ctx.translate(x,y);
        ctx.rotate(Math.PI/6);
        ctx.translate(-x,-y);
    }
}

flower(400,400);
</script>

</body>
</html>
